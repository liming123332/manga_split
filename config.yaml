# 条漫人物自动截取系统配置文件

# 输入输出配置
input:
  directory: ""  # 填写你的漫画文件夹路径，例如 "D:/漫画/作品名"
  recursive: true
  supported_formats: [".jpg", ".jpeg", ".png", ".webp", ".bmp"]

output:
  directory: "./output"
  format: "jpg"
  quality: 95
  save_metadata: true
  metadata_format: "json"

# 长条图分割配置
strip_split:
  enabled: true
  min_aspect_ratio: 3.0  # 高宽比大于此值视为长条图
  min_gap_size: 20       # 分割线最小像素宽度
  blur_kernel: 5         # 高斯模糊核大小
  threshold_value: 200   # 二值化阈值

# 图像增强预处理配置（可选，用于提高检测精度）
preprocess:
  enable_enhancement: false     # 是否启用检测前的图像增强
  enhance_output: false         # 是否增强输出图像（建议保持 false，保持原始画风）
  clahe_enabled: true           # CLAHE 对比度增强
  clahe_clip_limit: 2.0         # CLAHE 限制对比度阈值 (1.0-3.0)
  clahe_tile_size: 8            # CLAHE 网格大小 (4-16)
  sharpen_enabled: true         # 锐化
  sharpen_strength: 1.0         # 锐化强度 (0.5-2.0)
  denoise_enabled: false        # 去噪（计算密集，慎用）
  denoise_strength: 10.0        # 去噪强度 (5-20)

# SAM 模型配置
sam:
  model_type: "vit_l"  # vit_h (高精度), vit_l (平衡), vit_b (快速)
  device: "cuda"       # cuda, cpu, mps
  checkpoint_path: "./models/sam_vit_l_0b3195.pth"
  auto_prompt: "grid"  # grid, random, center
  grid_size: 32        # 网格提示的间距（像素）

# 人物检测配置
detection:
  method: "yolo"            # 检测方法: "yolo" (快速推荐) 或 "sam" (高精度)
  min_person_size: 256      # 人物最小尺寸（像素）
  max_persons_per_image: 10
  confidence_threshold: 0.5
  iou_threshold: 0.8        # NMS IoU 阈值
  face_crop_ratio: 0.5      # 人脸区域占人物上半部分比例（0-1，仅 SAM）
  face_center_crop: 0.6     # 人脸中心裁剪比例（0-1，仅 SAM）
  yolo_model_path: "./models/yolov8x6_animeface.pt"  # YOLO 模型路径

# 后处理配置
postprocess:
  edge_blur: 3          # 边缘羽化半径
  crop_borders: true    # 是否裁剪白边
  padding: 10           # 裁剪后保留的边距
  min_output_size: 512  # 输出图像最小尺寸
  max_output_size: 2048 # 输出图像最大尺寸

# 日志配置
logging:
  level: "INFO"         # DEBUG, INFO, WARNING, ERROR
  save_log: true
  log_file: "./processing.log"
  console_output: true

# 性能配置
performance:
  batch_size: 1         # 同时处理的图像数量
  num_workers: 4        # 数据加载线程数
  use_cache: true       # 是否缓存中间结果
  cache_dir: "./cache"
